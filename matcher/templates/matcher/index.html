<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Matcher</title>
    <style>
        /* Base styling and centering */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 2.5rem;
            color: #2c3e50;
        }

        /* Two-column layout */
        .columns-wrapper {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            margin-bottom: 40px;
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Search bar and button styling */
        .search-row {
            display: flex;
            gap: 10px;
        }

        .search-row input {
            flex: 1;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        .search-row input:focus {
            border-color: #3498db;
        }

        .search-row button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-row button:hover {
            background-color: #2980b9;
        }

        /* Results area placeholder */
        .results-box {
            min-height: 200px;
            border: 2px dashed #ddd;
            border-radius: 6px;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #888;
        }

        /* Big Match Button */
        .match-button {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px 60px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3);
        }

        .match-button:hover {
            background-color: #c0392b;
        }

        .match-button:active {
            transform: scale(0.95);
        }

        /* Mobile responsiveness */
        @media (max-width: 600px) {
            .columns-wrapper {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Movie Matcher</h1>

        <div class="columns-wrapper">

            <div class="column">
                <div class="search-row">
                    <input type="text" placeholder="Search Movie 1...">
                    <button>Search</button>
                </div>
                <div class="results-box" id="results-1">
                    Results will appear here
                </div>
            </div>

            <div class="column">
                <div class="search-row">
                    <input type="text" placeholder="Search Movie 2...">
                    <button>Search</button>
                </div>
                <div class="results-box" id="results-2">
                    Results will appear here
                </div>
            </div>

        </div>

        <button class="match-button">Match</button>
    </div>

</body>
</html>
